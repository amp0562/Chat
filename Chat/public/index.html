<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  background: #313338;
  color: #fff;
  height: 100vh;
  display: flex;
}

/* LEFT BAR */
.sidebar {
  width: 260px;
  background: #2b2d31;
  padding: 10px;
}

.sidebarbutton {
  border: none;
  background: transparent; /* same as parent */
  box-shadow: none;
  color: #b5bac1; /* slightly dim by default like discord */
  margin-bottom: 5px;
  margin-top: 5px;
  margin-left: -10px;
  margin-right: -10px;
  padding-left: 10px;
  width: calc(100% + 20px);
  height: 50px;
  text-align: left;
  cursor: pointer;
  border-radius: 6px;
  position: relative; /* needed for arrow */
}

.sidebarbutton:hover {
  background: #3a3d42; /* lighter than background */
  color: white;
}

.sidebarbutton::after {
  content: ">";
  position: absolute;
  transform: translateY(-125%);
  right: 10px;
  opacity: 0;
  transition: 0.2s;
}

.sidebarbutton:hover::after {
  opacity: 1;
}

.sidebarheader {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  background: #2b2d31;
  border-bottom: 1px solid #1e1f22;
}

.dm {
  display: flex;
  align-items: center;
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
}

.dm:hover {
  background: #3f4147;
}

.dm.active {
  background: #404249;
}

.avatar {
  width: 32px;
  height: 32px;
  background: transparent;
  border-radius: 50%;
  margin-right: 10px;
}

/* CHAT AREA */
.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.header {
  padding: 15px;
  background: #2b2d31;
  border-bottom: 1px solid #1e1f22;
}

.dmView {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.friendsView {
  flex: 1;
  display: none;
  flex-direction: column;
}

.messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.message {
  display: flex;
  margin-bottom: 10px;
}

.msgContent {
  margin-left: 10px;
}

/* INPUT */
.inputBar {
  padding: 10px;
  background: #383a40;
  display:none;
  flex-direction: row;
  width: 100%;
  align-items: center;
}

.inputBar textarea {
  display: none;
  width: calc(100% - 60px);
  padding: 10px;
  border-radius: 6px;
  border: none;
  outline: none;
  background: #1e1f22;
  color: #fff;
  min-width: 0;
  resize: none;
}

.inputBar button {
  display: none;
  background: #5865f2;
  color: #fff;
  border: none;
  padding: 10px 15px;
  border-radius: 6px;
  cursor: pointer;
  margin-left: 10px;
  width: 40px;
  height: 40px;
  flex-shrink: 0;
}

.FriendSearch {
  padding: 0px;
  background: transparent;
  display:flex;
  flex-direction: row;
  width: 100%;
  align-items: center;
}

.FriendSearch textarea {
  display: flex;
  font-size: 15px;
  width: calc(100% - 60px);
  padding: 5px;
  border-radius: 6px;
  border: none;
  outline: none;
  background: #1e1f22;
  color: #fff;
  min-width: 0;
  resize: none;
}

.FriendSearch button {
  display: flex;
  background: #5865f2;
  color: #fff;
  border: none;
  padding: 10px 15px;
  border-radius: 6px;
  cursor: pointer;
  margin-left: 10px;
  width: 40px;
  height: 40px;
  flex-shrink: 0;
}

.logoutbutton {
  float: right;
  background: #ff5252;
  color: #fff;
  border: none;
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
}

</style>
</head>

<body>

<div id="app" style="display:none; width:100%; height:100%;">
  <div class="sidebar">
    <div class="sidebarheader">
      <img id="avatarPreview" class="avatar" style="cursor:pointer;" title="Click to save avatar" />
      <input type="file" id="avatarInput" accept="image/*" style="display:none;">
      <span id="me"></span>
      <button onclick="logout()" style="background:#ff1717;color:white;border:none;padding:5px 8px;border-radius:4px;cursor:pointer;">
        Logout
      </button>
    </div>
    <div><button class="sidebarbutton" onclick="showFriends()"><h2>Friends</h2></button></div>
    <div><h3 style="color:#b5bac1;">Messages</h3></div>
    <div id="dmList"></div>
  </div>

  <div class="chat">
    <div class="header" id="chatHeader">Select a DM</div>

    <div class="dmView" id="dmView">
      <div class="messages" id="messages"></div>
        <div class="inputBar" id="inputBg">
          <textarea id="input" placeholder="Message..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" name="chatMessageRandom123"></textarea>
          <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
      </div>

    <div class="friendsView" id="friendsView">
      <div class="FriendSearch" style="padding:15px;">
        <textarea id="addFriendInput" placeholder="Search friends..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" name="chatMessageRandom123"></textarea>
        <button id="sendBtn" onclick="sendFriendRequest()">➤</button></div>
        <div id="pendingList"></div>
      </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let chattingWith = null;
let currentUser = null;
let avatar = null;

/* ===== AUTH ===== */

async function checkAuth() {
  const res = await fetch("/me");
  const data = await res.json();

  if (!data.user) {
    showAuth();
  } else {
    currentUser = data.user.username;
    avatar = data.user.avatar;
    document.getElementById("app").style.display = "flex";
    startApp();
  }
}

function showAuth() {
  document.body.innerHTML = `
    <div style="padding:40px">
      <h2>Login / Register</h2><br>
      <input id="user" placeholder="Username"><br><br>
      <input id="pass" type="password" placeholder="Password"><br><br>
      <button onclick="register()">Register</button>
      <button onclick="login()">Login</button>
    </div>
  `;
}

async function register() {
  await fetch("/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: user.value,
      password: pass.value
    })
  });

  alert("registered");
}

async function login() {
  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: user.value,
      password: pass.value
    })
  });

  const data = await res.json();

  if (data.ok) location.reload();
  else alert("login failed");
}

async function logout() {
  await fetch("/logout", { method: "POST" });
  location.reload();
}

/* ===== FRIENDS (THIS IS NOW YOUR DM LIST) ===== */

async function loadPending() {
  const res = await fetch("/pending");
  const requests = await res.json();

  const list = document.getElementById("pendingList");
  list.innerHTML = "<h3>Pending Requests</h3>";

  requests.forEach(user => {
    const div = document.createElement("div");
    div.className = "dm"; // reuse your styling

    div.innerHTML = `
      <span>${user}</span>
      <button onclick="acceptFriend('${user}')">Accept</button>
    `;

    console.log("Pending request from:", user);

    list.appendChild(div);
  });
}

async function acceptFriend(username) {
  await fetch("/accept-friend", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      sender: username
    })
  });

  loadPending();
  loadFriends(); // refresh friends
}

async function sendFriendRequest() {
  const input = document.getElementById("addFriendInput");
  const friend = input.value.trim();

  if (!friend || friend === currentUser) return;

  await fetch("/add-friend", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      receiver: friend
    })
  });

  input.value = "";
}

async function loadFriends() {
  const res = await fetch("/friends");
  const friends = await res.json();

  const list = document.getElementById("dmList");
  list.innerHTML = "";

  friends.forEach(user => {
  const div = document.createElement("div");
  div.className = "dm";

  const avatar = user.avatar || `https://api.dicebear.com/7.x/identicon/svg?seed=${user.username}`;

  div.innerHTML = `
    <img class="avatar" src="${avatar}" />
    <span>${user.username}</span>
  `;

  div.onclick = () => openChat(user.username);

  list.appendChild(div);
});
}

function showFriends() {
  document.getElementById("dmView").style.display = "none";
  document.getElementById("friendsView").style.display = "flex";
  document.getElementById("chatHeader").innerHTML = "Friends";

  loadPending();
}

/* ===== CHAT ===== */

function openChat(user) {
  chattingWith = user;

  document.querySelectorAll(".dm").forEach(d => d.classList.remove("active"));

  document.getElementById("chatHeader").innerHTML = user;
  document.getElementById("dmView").style.display = "flex";
  document.getElementById("friendsView").style.display = "none";
  document.getElementById("input").disabled = false;
  document.getElementById("inputBg").style.display = "flex";
  document.getElementById("input").style.display = "flex";
  document.getElementById("sendBtn").style.display = "flex";
  document.getElementById("input").focus();

  loadMessages();
}

function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text || !chattingWith) return;

  socket.emit("sendMessage", {
    sender: currentUser,
    to: chattingWith,
    text
  });

  input.value = "";
}

function startApp() {
  document.getElementById("me").innerText = currentUser;

  loadFriends();

  let avatarPreview = document.getElementById("avatarPreview");
  let avatarInput = document.getElementById("avatarInput");

  avatarPreview.src = avatar || `https://api.dicebear.com/7.x/initials/svg?seed=${currentUser}`;

  avatarPreview.addEventListener("click", () => {
    avatarInput.click();
  });

  avatarInput.onchange = async () => {
  const file = avatarInput.files[0];
  if (!file) return;

  // optional: preview instantly
  avatarPreview.src = URL.createObjectURL(file);

  const formData = new FormData();
  formData.append("avatar", file);

  await fetch("/set-avatar", {
    method: "POST",
    body: formData
  });

  console.log("uploaded");
};

  document.getElementById("input").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && chattingWith && !e.shiftKey) {
      e.preventDefault();

      const text = e.target.value.trim();
      if (!text) return;

      socket.emit("sendMessage", {
        sender: currentUser,
        to: chattingWith,
        text
      });

      e.target.value = "";
    }
  });
}

async function loadMessages() {
  const res = await fetch("/messages?withUser=" + chattingWith);
  const data = await res.json();

  const box = document.getElementById("messages");
  box.innerHTML = "";

  data.forEach(addMessage);
}

function addMessage(msg) {
  if (
    (msg.sender === currentUser && msg.receiver === chattingWith) ||
    (msg.sender === chattingWith && msg.receiver === currentUser)
  ) {
    const div = document.createElement("div");
    div.className = "message";

   const diff = Date.now() - msg.timestamp;

    const date = new Date(msg.timestamp);

    const hours = date.getHours().toString().padStart(2, "0");
    const minutes = date.getMinutes().toString().padStart(2, "0");

    let time;

    if (diff < 60000) {
      time = "Just now";
    }

    else if (diff < 3600000) {
      const mins = Math.floor(diff / 60000);
      time = `${mins} min ago`;
    }

    else if (diff < 86400000) {
     const hrs = Math.floor(diff / 3600000);
     time = `${hrs} hr ago`;
    }

    else if (diff < 172800000) {
      time = `Yesterday at ${hours}:${minutes}`;
    }

    else {
      const day = date.getDate().toString().padStart(2, "0");
      const month = (date.getMonth() + 1).toString().padStart(2, "0");
      const year = date.getFullYear();

      time = `${day}/${month}/${year}, ${hours}:${minutes}`;
    }

    div.innerHTML = `
      <img class="avatar" src="${msg.avatar || `https://api.dicebear.com/7.x/initials/svg?seed=${msg.sender}`}" />
      <div class="msgContent">
        <div><b>${msg.sender}</b><span style="color:#888; font-size:12px; margin-left: 10px;">${time}</span></div>
        <div>${msg.text}</div>
      </div>
    `;

    const box = document.getElementById("messages");
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }
}

socket.on("newMessage", addMessage);

/* ===== START ===== */
checkAuth();
</script>


</body>
</html>
